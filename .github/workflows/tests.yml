name: tests

# Runs the IPC + multi-client / multi-agent suite under tests/.
# The suite is hub-on-loopback only — it does not need Docker, LiveKit,
# or NVENC, so it runs cleanly on a stock ubuntu-latest runner.
# Integration tests under -m integration are auto-skipped because no hub
# is started here.

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs for the same ref when a new commit arrives.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            tests/pyproject.toml
            tests/uv.lock
            agent-sdk/pyproject.toml
            server-runtime/pyproject.toml

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync test workspace
        working-directory: tests
        run: uv sync --python ${{ matrix.python-version }}

      - name: Run tests
        working-directory: tests
        run: uv run pytest -v --tb=short --color=yes
