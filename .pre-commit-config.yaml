# One-time setup after cloning:
#   uv tool install pre-commit        # install pre-commit itself (once per machine)
#   pre-commit install                 # wire the pre-commit stage hooks
#   pre-commit install --hook-type commit-msg   # wire the DCO commit-msg hook
#
# See AGENTS.md § DCO sign-off and § License headers.

repos:
  # ── Ruff lint (matches CI: ruff.toml at repo root, version pinned to CI) ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: check-spdx-headers
        name: check SPDX headers
        description: >
          Every source file must start with the NVIDIA SPDX header in the
          comment syntax for its language (see AGENTS.md § License headers).
          Missing headers are auto-inserted; pre-commit then aborts the
          commit so the operator reviews + re-stages the change.
        entry: python3 .github/scripts/check_spdx_headers.py --fix
        language: system
        pass_filenames: true
        # Restrict to the file types the script knows how to handle, so
        # pre-commit doesn't shell out for every random binary asset.
        types_or:
          - python
          - yaml
          - toml
          - shell
          - swift
          - kotlin
          - javascript
          - ts
          - tsx
          - xml
          - html
          - markdown
        exclude: |
          (?x)^(
            LICENSE
            | gradlew(\.bat)?
            | gradle/wrapper/gradle-wrapper\.properties
          )$

      - id: dco-sign-off
        name: DCO sign-off
        description: >
          Every commit must carry a Signed-off-by trailer (DCO v1.1).
          Fails if the trailer is absent; fix with `git commit --amend -s`.
        entry: bash .github/scripts/check_dco.sh
        language: system
        stages: [commit-msg]
        always_run: true
        pass_filenames: false
