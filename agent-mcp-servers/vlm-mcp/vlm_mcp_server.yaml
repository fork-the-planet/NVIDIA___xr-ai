# VLM MCP server reference configuration.
# Copy to your agent sample root as vlm_mcp_server.yaml and edit.
#
# This server is a pure FastMCP wrapper around vlm-server (ai-services/vlm-server/).
# It exposes one MCP tool — ask_image(question, image_path) — that reads a local
# image file and forwards it to vlm-server's OpenAI-compatible chat-completions
# endpoint via the xr-ai-models SDK. There is no hub IPC subscription and no
# `xr-ai-agent` dependency.
#
# The MCP endpoint is served at http://<host>:<port>/mcp via StreamableHTTP.
# Use the URL WITHOUT a trailing slash — Starlette's strict path matching
# replies with 307 redirect on /mcp/, which NAT's streamable-http MCP client
# treats as an error.

host:                  0.0.0.0
port:                  8240

# Model configuration — identifies the VLM backend by logical name "vlm".
# The cosmos_vlm preset targets ai-services/vlm-server/ (Cosmos-Reason1-7B
# via vLLM). Only base_url needs to be set here; the preset fills in the rest.
models:
  vlm:
    kind:     preset:cosmos_vlm
    base_url: http://localhost:8100

# httpx timeout applied to each call to vlm-server.
vlm_request_timeout_s: 60.0

# Whether to let the VLM produce chain-of-thought reasoning before answering.
# false (default) — suppresses <think> generation entirely; faster responses,
#                   better for real-time captioning and voice loops.
# true             — enables full reasoning; more accurate on complex queries
#                   but adds several seconds of latency per request.
enable_thinking: false
