[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mcp-agent-worker"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "xr-ai-agent",
    "numpy>=1.24",
    "httpx>=0.27",
    "fastmcp>=0.4",
    "pyyaml>=6.0",
]

[tool.uv.sources]
xr-ai-agent = { path = "../../../agent-sdk", editable = true }

[project.scripts]
mcp_agent_worker = "mcp_agent_worker:run"

[tool.hatch.build.targets.wheel]
only-include = [
    "mcp_agent_worker.py",
    "agent.py",
    "audio.py",
    "services.py",
    "voice.py",
]
