# XR Media Hub configuration for the mcp-agent sample.
# Paths are relative to this file's directory.
# See server-runtime/xr_media_hub.yaml for all available options.

# ── LiveKit server ────────────────────────────────────────────────────────────
api_key:    devkey
api_secret: devsecret-xr-livekit-prototype-2026
room_name:  xr-room

lk_port_ws:  7880
lk_port_tcp: 7881
lk_port_udp: 7882

# ── Web client server ─────────────────────────────────────────────────────────
enable_web_server: true
web_server_port:   8080
web_client_dir:    ../../client-samples/web
web_server_tls:    true

# ── Optional: token server ────────────────────────────────────────────────────
enable_token_server: true

# ── NVENC video recording ─────────────────────────────────────────────────────
# Requires pynvvideocodec.  Set enabled: true to activate.
# out_dir defaults to /dev/shm/xr-ai/recordings (tmpfs — RAM-backed).
# Eviction is FIFO once total chunk size across all participants exceeds
# max_total_bytes.
video_recording:
  enabled:         true
  out_dir:         /dev/shm/xr-ai/recordings
  chunk_frames:    30                    # 1 s at 30 fps
  max_total_bytes: 524288000             # 500 MB cap across all participants
  sample_fps:      30.0
  bitrate:         4000000               # VBR target bitrate in bps
  gpu_id:          0
