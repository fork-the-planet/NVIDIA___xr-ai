# VLM server — DGX Spark (GB10, ~120 GiB GPU-visible HBM).
#
# vlm is SECOND in load order: agent-llm → vlm → llm.
# free_at_startup ≈ 120 − 42 (agent-llm) − 2 (STT) ≈ 76 GiB.
# 0.20 × 120 = 24 GiB cap: ~16 GiB Cosmos-7B weights + ~8 GiB KV.

model: nvidia/Cosmos-Reason1-7B
hf_token: ""
port: 8100
host: "0.0.0.0"
model_cache: ../../../../models
gpu_memory_utilization: 0.20
max_num_seqs: 4
enforce_eager: true
max_videos_per_prompt: 0

# vLLM runtime: pip (this wrapper's venv) or docker (NGC nvcr.io/nvidia/vllm).
# See ai-services/vlm-server/vlm_server.yaml for the full toggle docs.
vllm_backend: docker
vllm_image:   nvcr.io/nvidia/vllm:26.04-py3
