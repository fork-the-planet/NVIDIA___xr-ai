[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "simple-vlm-example-worker"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "xr-ai-agent",
    "numpy>=1.24",
    "Pillow>=10.0",
    "httpx>=0.27",
    "pyyaml>=6.0",
]

[tool.uv.sources]
xr-ai-agent = { path = "../../../agent-sdk", editable = true }

[project.scripts]
simple_vlm_example_worker = "simple_vlm_example_worker:run"

[tool.hatch.build.targets.wheel]
only-include = [
    "simple_vlm_example_worker.py",
    "agent.py",
    "audio.py",
    "pixels.py",
    "services.py",
    "voice.py",
]
