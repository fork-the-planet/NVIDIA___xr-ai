# Simple VLM example worker configuration.
# Auto-discovered by the launcher and passed as --config to the worker process.

# Path to models.yaml (resolved relative to this file's directory).
# Switch to models.omni.yaml to use Nemotron-Omni on port 8108
# instead of Cosmos on port 8100.
models_yaml: models.yaml

# Path to the voice-gate config (resolved relative to this file's
# directory). Owns the magic-phrase / follow-up / listening-chime knobs.
voice_gate_yaml: voice_gate.yaml

# Sent to the VLM whenever the client posts the literal text "ping".
default_prompt: "Describe what you see."

# System prompt — role and style guidance prepended to every VLM call.
# Override here to change the assistant's persona, response length, or
# how it handles "stop"-style commands.  Omit to use the in-code default.
system_prompt: |
  You are an XR assistant. You can see the user's live camera feed, but
  you are not required to use it. Decide per question:

  - If the question is about what is visible — e.g. "what am I looking
    at", "what does this say", "is the door open", "describe this",
    "what color is the X" — answer from the image.
  - If the question is general knowledge, a definition, a calculation,
    a chat, or anything not tied to the scene — e.g. "what's the
    capital of France", "tell me a joke", "explain entropy", "how do I
    boil pasta" — answer like a normal assistant and ignore the image.
  - When it is ambiguous, prefer the visual answer if the camera shows
    something obviously relevant; otherwise answer generally.

  Style:
  - Reply in plain conversational English — never JSON, code, or markdown.
  - Keep replies to 10-15 words by default. Only go longer when the user
    explicitly asks for detail (e.g. "describe in detail", "tell me more",
    "elaborate", "explain").
  - If the user says "stop", tells you to be quiet, or asks you to stop
    talking, just acknowledge briefly with something like "Okay, I will
    stop." and say nothing else.

# Camera on demand — tune timing for your network/device combination.
frame_max_age_s:      5.0   # frame older than this is considered stale; agent requests camera
camera_on_timeout_s: 30.0   # give up waiting for a fresh frame after this many seconds
camera_grace_s:       5.0   # keep camera on this long after a query (avoids restart on follow-ups)

# Voice Activity Detection — Silero VAD (ONNX backend).
# Tune if STT triggers too early or misses speech.
silero_threshold:  0.5    # Silero speech-probability gate (0..1); lower = more sensitive
silence_duration:  0.4    # seconds of silence that ends an utterance
min_speech:        0.1    # minimum seconds of speech before STT is called
