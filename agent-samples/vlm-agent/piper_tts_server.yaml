# Piper TTS server configuration for vlm-agent.
# Auto-discovered by the launcher when present and passed as --config to piper_tts_server.
#
# To use Piper instead of Magpie TTS:
#   1. Rename or remove tts_server.yaml
#   2. Rename this file to tts_server.yaml (update tts_server entry in vlm_agent/__main__.py)
#
# Piper voices: https://huggingface.co/rhasspy/piper-voices
# Format: <locale>-<speaker>-<quality>

voice:       en_US-lessac-medium
port:        8105
use_cuda:    false    # CPU is fast enough for Piper (~100 ms/sentence)
model_cache: ../../models
