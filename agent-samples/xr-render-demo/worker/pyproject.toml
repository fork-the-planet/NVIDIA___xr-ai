[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "xr-render-demo-worker"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "xr-ai-agent",
    "xr-ai-pipecat",
    "numpy>=1.24",
    "scipy>=1.11",
    "pyyaml>=6.0",
    "httpx>=0.27",
    "fastmcp>=0.4",
    "pipecat-ai>=0.0.46",
    # Neural VAD — ONNX backend, no PyTorch required in this venv.
    "silero-vad>=5.1",
]

[tool.uv.sources]
xr-ai-agent   = { path = "../../../agent-sdk",   editable = true }
xr-ai-pipecat = { path = "../../../agent-sdk/xr-ai-pipecat", editable = true }

[project.scripts]
xr_render_demo_worker = "xr_render_demo_worker:run"

[tool.hatch.build.targets.wheel]
only-include = [
    "xr_render_demo_worker.py",
    "agent.py",
    "processors.py",
    "config.py",
]
