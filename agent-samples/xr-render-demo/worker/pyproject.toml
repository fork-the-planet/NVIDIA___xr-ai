[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "xr-render-demo-worker"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "xr-ai-agent",
    "xr-ai-models",
    "xr-ai-pipecat",
    "xr-ai-voicegate",
    "xr-ai-logging",
    "numpy>=1.24",
    "Pillow>=10.0",
    "pyyaml>=6.0",
    "fastmcp>=2.0",
    "pipecat-ai>=1.0",
]

[tool.uv.sources]
xr-ai-agent     = { path = "../../../agent-sdk",                    editable = true }
xr-ai-models    = { path = "../../../agent-sdk/xr-ai-models",       editable = true }
xr-ai-pipecat   = { path = "../../../agent-sdk/xr-ai-pipecat",      editable = true }
xr-ai-voicegate = { path = "../../../utils/xr-ai-voicegate",        editable = true }
xr-ai-logging   = { path = "../../../utils/xr-ai-logging",          editable = true }

[project.scripts]
xr_render_demo_worker = "xr_render_demo_worker:run"

[tool.hatch.build.targets.wheel]
only-include = [
    "xr_render_demo_worker.py",
    "agent.py",
    "processors.py",
    "tooling.py",
    "config.py",
    "pixels.py",
]
