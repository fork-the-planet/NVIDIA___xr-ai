# Nemotron-3-Nano — single Blackwell 96 GB.
# NVFP4 model auto-selected for Blackwell (SM10+).
#
# agent-llm is FIRST in load order on Blackwell so FlashInfer MoE JIT
# compilation runs with the full GPU free.
#
# free_at_startup ≈ 96 GiB.
# 0.35 × 96 = 33.6 GiB cap: ~15-20 GiB NVFP4 weights + ~14 GiB KV.
#
# Total budget (agent-llm 0.35 + vlm 0.20 + llm 0.16):
#   0.71 × 96 ≈ 68 GiB — leaves ~28 GiB for STT, LOVR, drivers, overhead.

host: "0.0.0.0"
port: 8107
hf_token: ""
model_cache: ../../../../models

max_num_seqs:         8
tensor_parallel_size: 1
max_model_len:        32768

gpu_memory_utilization: 0.35
enforce_eager: true
