# XR Media Hub configuration for the xr-render-demo sample.
# Paths are relative to this file's directory.
# See server-runtime/xr_media_hub.yaml for all available options.

# ── LiveKit server ────────────────────────────────────────────────────────────
api_key:    devkey
api_secret: devsecret-xr-livekit-prototype-2026
room_name:  xr-room

lk_port_ws:  7880
lk_port_tcp: 7881
lk_port_udp: 7882

# ── Web client server ─────────────────────────────────────────────────────────
# The page serves both stacks: LiveKit (agent audio/data over the WSS proxy on
# this port) AND CloudXR (one-tap Launch XR → WebXR over wss://<host>:48322).
# Because both live in the same JS context, entering XR does not drop the
# agent connection.
enable_web_server: true
web_server_port:   8080
web_client_dir:    ../../../client-samples/web-xr
web_server_tls:    true

# ── Optional: token server ────────────────────────────────────────────────────
enable_token_server: true

# ── Video recording (needed by video-mcp for visual queries) ──────────────────
video_recording:
  enabled: true
  out_dir:  /tmp/xr_recordings/xr-render-demo   # must match video_mcp_server.yaml recordings_dir
