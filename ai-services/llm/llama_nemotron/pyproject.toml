[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llama-nemotron-llm-server"
version = "0.1.0"
requires-python = ">=3.11,<3.13"
dependencies = [
    "vllm>=0.12.0",
    "pyyaml>=6.0",
    "hf-transfer>=0.1.4",
    "xr-ai-logging",
]

[project.scripts]
llama_nemotron_llm_server = "llama_nemotron_llm_server.__main__:run"

[tool.uv.sources]
xr-ai-logging = { path = "../../../utils/xr-ai-logging", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["llama_nemotron_llm_server"]
