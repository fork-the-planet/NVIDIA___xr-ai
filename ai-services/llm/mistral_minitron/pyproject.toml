[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mistral-minitron-llm-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.2",
    "transformers>=4.49",
    "accelerate>=0.30",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "hf-transfer>=0.1.4",
    "pyyaml>=6.0",
]

[project.scripts]
mistral_minitron_llm_server = "mistral_minitron_llm_server.__main__:run"

[tool.hatch.build.targets.wheel]
packages = ["mistral_minitron_llm_server"]
