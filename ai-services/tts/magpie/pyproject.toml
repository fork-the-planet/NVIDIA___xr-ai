[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "magpie-tts-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "nemo_toolkit[tts]>=2.0",
    "soundfile>=0.12",
    "numpy>=1.24",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "hf-transfer>=0.1.4",
    "pyyaml>=6.0",
]

[project.scripts]
magpie_tts_server = "magpie_tts_server.__main__:run"

[tool.hatch.build.targets.wheel]
packages = ["magpie_tts_server"]
