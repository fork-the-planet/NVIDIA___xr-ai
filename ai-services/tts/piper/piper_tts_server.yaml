# Piper TTS server reference configuration.
# Copy to your agent sample root as piper_tts_server.yaml and edit as needed.
#
# Browse available voices: https://huggingface.co/rhasspy/piper-voices
# Voice name format: <locale>-<speaker>-<quality>
# Examples: en_US-lessac-medium, en_GB-alan-medium, de_DE-thorsten-medium

voice:       en_US-lessac-medium
port:        8105
use_cuda:    false    # CPU is fast enough (~100 ms/sentence)
model_cache: ../models
