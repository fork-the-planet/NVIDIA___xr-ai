# Project-wide Gradle settings.

# JVM args for the Gradle daemon. 2 GB is enough for this sample;
# Android Studio bumps this on its own when needed.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX — required by Compose, Lifecycle, Activity, Material3, etc.
android.useAndroidX=true

# Disable automatic Jetifier rewrite — none of our deps need legacy support libs.
android.nonTransitiveRClass=true

# Use Kotlin's official code style.
kotlin.code.style=official
