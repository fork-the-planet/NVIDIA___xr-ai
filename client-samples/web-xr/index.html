<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVIDIA XR-AI Sample</title>

  <!-- Both bundles served same-origin from /vendor/ so the page works on
       headsets / offline LANs. Produced by client-samples/web-xr-build/build.sh. -->
  <script type="importmap">
  {
    "imports": {
      "livekit-client":   "/vendor/livekit-client.esm.mjs",
      "@nvidia/cloudxr":  "/vendor/cloudxr-sdk.esm.mjs"
    }
  }
  </script>

  <style>
    /* ── Reset & base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f2f2f7;
      --card:          #ffffff;
      --separator:     rgba(60, 60, 67, 0.12);
      --label:         #000000;
      --secondary:     rgba(60, 60, 67, 0.6);
      --blue:          #007aff;
      --red:           #ff3b30;
      --green:         #34c759;
      --orange:        #ff9500;
      --yellow:        #ffcc00;
      --grey:          rgba(60, 60, 67, 0.18);
      --radius:        12px;
      --font:          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --mono:          ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace;
    }

    body {
      font-family: var(--font);
      font-size: 15px;
      background: var(--bg);
      color: var(--label);
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Page header ──────────────────────────────────────────────────── */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 8px 0 24px;
    }

    /* ── Grouped sections (iOS-style) ─────────────────────────────────── */
    .section {
      margin-bottom: 32px;
    }

    .section-header {
      font-size: 13px;
      font-weight: 600;
      color: var(--secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      padding: 0 4px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 0 var(--separator);
    }

    .field-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--separator);
      gap: 12px;
      transition: opacity 0.2s;
    }

    .field-row:last-child { border-bottom: none; }

    .field-row.dimmed { opacity: 0.4; pointer-events: none; }

    .field-label {
      font-size: 15px;
      color: var(--label);
      min-width: 90px;
      flex-shrink: 0;
    }

    .field-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 15px;
      color: var(--label);
      background: transparent;
      text-align: right;
    }

    .field-input::placeholder { color: var(--secondary); }

    .field-input:disabled { cursor: default; }

    .field-hint {
      font-size: 13px;
      color: var(--secondary);
      margin: 8px 16px 4px;
      line-height: 1.4;
    }
    .field-hint a {
      color: var(--blue);
      text-decoration: underline;
    }
    /* When the cert probe succeeds, the hint text + link go green and the
       link text is replaced by a "✓ accepted" string. */
    .field-hint.cert-accepted        { color: var(--green); }
    .field-hint.cert-accepted a      { color: var(--green); }

    /* ── State badge ──────────────────────────────────────────────────── */
    .state-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background-color 0.3s ease;
    }

    .state-dot.disconnected  { background: var(--secondary); }
    .state-dot.connected     { background: var(--green); }

    .state-dot.connecting,
    .state-dot.reconnecting  {
      background: var(--orange);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    #state-label {
      font-size: 15px;
      color: var(--secondary);
    }

    /* ── Buttons ──────────────────────────────────────────────────────── */
    .btn-row {
      display: flex;
      align-items: center;
      padding: 11px 16px;
      border-bottom: 1px solid var(--separator);
    }

    .btn-row:last-child { border-bottom: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary     { background: var(--blue);    color: #fff; }
    .btn-destructive { background: var(--red);     color: #fff; }
    .btn-secondary   { background: var(--grey);    color: var(--label); }

    .btn-full { width: 100%; }

    /* ── Camera status ────────────────────────────────────────────────── */
    .status-text {
      font-size: 15px;
    }

    .status-active { color: var(--green);    font-weight: 500; }
    .status-idle   { color: var(--secondary); }

    /* ── Data channel row ─────────────────────────────────────────────── */
    .input-send-row {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      gap: 10px;
      border-bottom: 1px solid var(--separator);
    }

    .input-send-row:last-child { border-bottom: none; }

    .text-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 15px;
      color: var(--label);
      background: transparent;
    }

    .text-input::placeholder { color: var(--secondary); }

    /* ── Camera select ───────────────────────────────────────────────── */
    .field-select {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 15px;
      color: var(--label);
      background: transparent;
      cursor: pointer;
      text-align: right;
    }

    .field-select:disabled { opacity: 0.4; cursor: default; }

    /* ── Camera + data rows with label + trailing content ─────────────── */
    .labeled-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px;
      border-bottom: 1px solid var(--separator);
    }

    .labeled-row:last-child { border-bottom: none; }

    .labeled-row .row-label {
      font-size: 15px;
      color: var(--label);
    }

    /* ── Messages list ────────────────────────────────────────────────── */
    #messages {
      list-style: none;
    }

    .message-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--separator);
    }

    .message-item:last-child { border-bottom: none; }

    .message-text {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--label);
      word-break: break-all;
      flex: 1;
    }

    .message-time {
      font-size: 11px;
      color: var(--secondary);
      flex-shrink: 0;
    }

    .empty-hint {
      padding: 12px 16px;
      font-size: 14px;
      color: var(--secondary);
      font-style: italic;
    }

    /* ── Error toast ──────────────────────────────────────────────────── */
    #error-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30, 30, 30, 0.9);
      color: #fff;
      font-size: 14px;
      padding: 12px 20px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      max-width: min(420px, calc(100vw - 32px));
      text-align: center;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 2147483647;
    }

    #error-toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Responsive max-width ─────────────────────────────────────────── */
    .page-content {
      max-width: 540px;
      margin: 0 auto;
    }

    /* ── On-page debug log ────────────────────────────────────────────── */
    #debug-log {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--label);
      max-height: 240px;
      overflow-y: auto;
      padding: 8px 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #debug-log .log-line { padding: 2px 0; border-bottom: 1px solid var(--separator); }
    #debug-log .log-line:last-child { border-bottom: none; }
    #debug-log .log-err  { color: var(--red); }
    #debug-log .log-warn { color: var(--orange); }
    #debug-log .log-info { color: var(--label); }
    #debug-log .log-time { color: var(--secondary); margin-right: 6px; }

    .debug-actions {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--separator);
    }

  </style>
</head>

<body>
  <div class="page-content">
    <h1 class="page-title">NVIDIA XR-AI Sample</h1>

    <!-- ── Connection section ─────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Connection</h2>
      <div class="card">

        <!-- State badge -->
        <div class="labeled-row">
          <span class="row-label">State</span>
          <div class="state-badge">
            <span id="state-dot" class="state-dot disconnected"></span>
            <span id="state-label">Disconnected</span>
          </div>
        </div>

        <!-- Host -->
        <div class="field-row">
          <label class="field-label" for="host-input">Host / IP</label>
          <input
            id="host-input"
            class="field-input"
            type="text"
            placeholder="192.168.1.100"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <!-- Port -->
        <div class="field-row">
          <label class="field-label" for="port-input">Port</label>
          <input
            id="port-input"
            class="field-input"
            type="number"
            min="1"
            max="65535"
            placeholder="7880"
          >
        </div>

        <!-- Token (JWT) -->
        <div class="field-row">
          <label class="field-label" for="token-input">Token</label>
          <input
            id="token-input"
            class="field-input"
            type="text"
            placeholder="Paste JWT directly"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <!-- Token server URL -->
        <div class="field-row">
          <label class="field-label" for="token-url-input">Token URL</label>
          <input
            id="token-url-input"
            class="field-input"
            type="url"
            placeholder="/token (default)"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <!-- Identity -->
        <div class="field-row">
          <label class="field-label" for="identity-input">Identity</label>
          <input
            id="identity-input"
            class="field-input"
            type="text"
            placeholder="web-client"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <!-- Connect / Disconnect -->
        <div class="btn-row">
          <button id="connect-btn" class="btn btn-primary btn-full">Connect</button>
        </div>

      </div>
    </section>

    <!-- ── Media section ──────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Media</h2>
      <div class="card">

        <!-- Audio mode -->
        <div class="field-row" id="audio-mode-row">
          <label class="field-label" for="audio-mode-select">Mic Mode</label>
          <select id="audio-mode-select" class="field-select"></select>
        </div>

        <!-- Microphone toggle -->
        <div class="btn-row">
          <button id="audio-btn" class="btn btn-secondary btn-full" disabled>
            Start Microphone
          </button>
        </div>

        <!-- Microphone status -->
        <div class="labeled-row">
          <span class="row-label">Microphone</span>
          <span id="audio-status" class="status-text status-idle">Not connected</span>
        </div>

        <!-- Camera selector (hidden when only one camera is available) -->
        <div id="camera-select-row" class="field-row" style="display:none">
          <label class="field-label" for="camera-select">Camera</label>
          <select id="camera-select" class="field-select"></select>
        </div>

        <!-- Camera on demand toggle -->
        <div class="labeled-row">
          <label class="row-label" for="camera-on-demand">On demand</label>
          <input type="checkbox" id="camera-on-demand">
        </div>

        <!-- Camera toggle -->
        <div class="btn-row">
          <button id="camera-btn" class="btn btn-secondary btn-full" disabled>
            Start Camera
          </button>
        </div>

        <!-- Camera status -->
        <div class="labeled-row">
          <span class="row-label">Camera</span>
          <span id="camera-status" class="status-text status-idle">Not connected</span>
        </div>

      </div>
    </section>

    <!-- ── Agent section ────────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Agent</h2>
      <div class="card">
        <div class="labeled-row">
          <span class="row-label">Status</span>
          <div class="state-badge">
            <span id="agent-status-dot" class="state-dot disconnected"></span>
            <span id="agent-status-label">—</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── XR Stream section ──────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">XR Stream</h2>
      <div class="card">

        <!-- XR status -->
        <div class="labeled-row">
          <span class="row-label">State</span>
          <div class="state-badge">
            <span id="xr-state-dot"   class="state-dot disconnected"></span>
            <span id="xr-state-label">Idle</span>
          </div>
        </div>

        <!-- XR host -->
        <div class="field-row">
          <label class="field-label" for="xr-host-input">Host / IP</label>
          <input
            id="xr-host-input"
            class="field-input"
            type="text"
            placeholder="Same as page host"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
        </div>

        <!-- XR port (CloudXR WSS proxy default: 48322) -->
        <div class="field-row">
          <label class="field-label" for="xr-port-input">Port</label>
          <input
            id="xr-port-input"
            class="field-input"
            type="number"
            min="1"
            max="65535"
            placeholder="48322"
          >
        </div>

        <!-- Launch / Exit -->
        <div class="btn-row">
          <button id="xr-launch-btn" class="btn btn-primary btn-full">Launch XR</button>
        </div>

        <!-- Cert-accept hint. cloudxr-runtime serves the WSS proxy with a
             self-signed cert; the browser must accept it once before Launch
             XR can complete. The link opens in a new tab; on returning
             (window focus) we re-fetch the cert URL and flip the label to
             a green "accepted" state if it now succeeds. Mirrors the
             cloudxr-js/examples/simple cert-acceptance pattern. -->
        <p id="xr-cert-hint" class="field-hint">
          First-time setup:
          <a id="xr-cert-link" target="_blank" rel="noopener noreferrer">accept the CloudXR cert</a>
          once, then come back and Launch XR.
        </p>

      </div>
    </section>

    <!-- ── Data channel section ───────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Data Channel</h2>
      <div class="card">

        <!-- Ping -->
        <div class="btn-row">
          <button id="ping-btn" class="btn btn-secondary btn-full" disabled>
            Send Ping
          </button>
        </div>

        <!-- Custom message -->
        <div class="input-send-row">
          <input
            id="message-input"
            class="text-input"
            type="text"
            placeholder="Custom message&#x2026;"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          >
          <button id="send-btn" class="btn btn-primary" disabled>Send</button>
        </div>

      </div>
    </section>

    <!-- ── Received messages ──────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Received</h2>
      <div class="card">
        <ul id="messages">
          <li class="empty-hint">No messages received yet.</li>
        </ul>
      </div>
    </section>

    <!-- ── Debug log ──────────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-header">Debug</h2>
      <div class="card">
        <div class="debug-actions">
          <button id="debug-clear-btn" class="btn btn-secondary">Clear</button>
          <button id="debug-copy-btn"  class="btn btn-secondary">Copy</button>
          <button id="debug-test-btn"  class="btn btn-secondary">Probe SDK</button>
        </div>
        <div id="debug-log"></div>
      </div>
    </section>

  </div><!-- /.page-content -->

  <!-- Canvas consumed by WebXR / CloudXR.  Intentionally unstyled — WebXR
       renders into XRWebGLLayer's framebuffer and IWER (in desktop dev) drives
       the on-page presentation through this element.  Don't add CSS here. -->
  <canvas id="xr-canvas"></canvas>

  <!-- Error toast -->
  <div id="error-toast" role="alert" aria-live="assertive"></div>

  <!-- Early error capture — runs before the module script below, so failures
       during module resolution/loading (e.g. import-map CDN unreachable) are
       visible on the page even if app.js never executes. -->
  <script>
    (function () {
      const logEl = document.getElementById('debug-log');
      const lines = [];

      function stamp() {
        const d = new Date();
        return d.toTimeString().slice(0, 8) + '.' +
               String(d.getMilliseconds()).padStart(3, '0');
      }

      function append(level, msg) {
        const line = { t: stamp(), level, msg: String(msg) };
        lines.push(line);

        // Mirror to the browser console so the messages are still reachable
        // while an immersive XR session is blocking interaction with the
        // on-page log box (user can read/copy them from DevTools after exit).
        const cfn = level === 'err' ? 'error' : level === 'warn' ? 'warn' : 'log';
        try { console[cfn]('[dbg]', msg); } catch (_) { /* swallow */ }

        if (!logEl) return;
        const el = document.createElement('div');
        el.className = 'log-line log-' + level;
        el.innerHTML = '<span class="log-time">' + line.t + '</span>' +
          line.msg.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        logEl.appendChild(el);
        logEl.scrollTop = logEl.scrollHeight;
      }

      window.__dbg = {
        info: (m) => append('info', m),
        warn: (m) => append('warn', m),
        err:  (m) => append('err',  m),
        lines: () => lines,
      };

      window.addEventListener('error', (ev) => {
        const where = ev.filename ? ' @ ' + ev.filename + ':' + ev.lineno + ':' + ev.colno : '';
        window.__dbg.err('window.error: ' + (ev.message || ev.error) + where);
      });

      window.addEventListener('unhandledrejection', (ev) => {
        const r = ev.reason;
        const msg = (r && r.stack) ? r.stack : (r && r.message) ? r.message : String(r);
        window.__dbg.err('unhandledrejection: ' + msg);
      });

      window.__dbg.info('page loaded: ' + window.location.href);
      window.__dbg.info('userAgent: ' + navigator.userAgent);

      const clearBtn = document.getElementById('debug-clear-btn');
      const copyBtn  = document.getElementById('debug-copy-btn');
      const testBtn  = document.getElementById('debug-test-btn');
      if (clearBtn) clearBtn.addEventListener('click', () => { lines.length = 0; logEl.innerHTML = ''; });
      if (copyBtn)  copyBtn.addEventListener('click', async () => {
        const text = lines.map(l => '[' + l.t + '] ' + l.level + ': ' + l.msg).join('\n');
        try { await navigator.clipboard.writeText(text); window.__dbg.info('log copied to clipboard'); }
        catch (e) { window.__dbg.warn('clipboard failed: ' + e); }
      });
      if (testBtn) testBtn.addEventListener('click', async () => {
        const url = '/vendor/livekit-client.esm.mjs';
        window.__dbg.info('probing: ' + url);
        try {
          const r = await fetch(url, { method: 'HEAD' });
          window.__dbg.info('SDK HEAD status=' + r.status + ' ' + (r.ok ? 'ok' : 'FAIL'));
        } catch (e) {
          window.__dbg.err('SDK fetch failed: ' + e);
        }
      });
    })();
  </script>

  <!-- Application entry point -->
  <script type="module" src="/App/app.js"></script>
</body>
</html>
