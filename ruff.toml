# First-cut lint config. Conservative ruleset (E,F,W,I); no `ruff format`.
# 120 is the line-length ceiling chosen to cover existing code with minimal
# grandfathering (most code wraps ~100). The per-file-ignores block below is a
# generated grandfather snapshot of pre-existing violations at ruff
# introduction: new code must pass clean, and the list burns down as cleanup
# PRs land. Regenerate after a cleanup with `ruff check . --output-format=json`.

line-length = 120

# Nested per-package .venv dirs hold third-party code; ruff's default excludes
# the top-level .venv but not these. .claude holds agent worktrees (copies of
# the repo) that must never be linted; deps/models are auto-downloaded assets.
extend-exclude = [
    "**/.venv",
    ".claude",
    "deps",
    "models",
]

[lint]
select = ["E", "F", "W", "I"]

[lint.isort]
# The test suite's shared helpers are local modules (sibling files on the
# test dir's sys.path), not third-party packages — group them accordingly.
known-first-party = ["_helpers", "_helpers_subprocess"]

