# XR Media Hub configuration
# Run from the xr-ai/ directory:  uv run --project server-runtime xr_media_hub
# Or from server-runtime/:        uv run xr_media_hub --config ../xr_media_hub.yaml

# ── LiveKit server ────────────────────────────────────────────────────────────
api_key:    devkey
api_secret: devsecret-xr-livekit-prototype-2026
room_name:  xr-room

lk_port_ws:  7880
lk_port_tcp: 7881
lk_port_udp: 7882

# ── Web client server ─────────────────────────────────────────────────────────
enable_web_server: true
web_server_host:   "0.0.0.0"
web_server_port:   8080
# Path is relative to this file's directory.
web_client_dir:    client-samples/web

# ── Optional: token server (only needed for HTTPS/WSS proxy) ─────────────────
enable_token_server: true
